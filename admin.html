<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f5f6fa; padding:20px; }

h1 { text-align:center; }

table {
  width:100%;
  border-collapse: collapse;
  background:white;
}

th, td {
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
}

th {
  background:#3f2b96;
  color:white;
}

.time {
  background:#8fd19e;
  font-weight:bold;
}

.office { background:#d4edda; }
.field { background:#fff3cd; }
.external { background:#f8d7da; }

canvas {
  margin-top:40px;
}
</style>
</head>

<body>

<h1>WEEKLY WORK SCHEDULE</h1>

<table id="grid"></table>

<canvas id="chart"></canvas>

<script>
const url = "https://script.google.com/macros/s/AKfycbzgW83D5h0KmIf2kQI1F9Le3Ux4Xg8EW5smijMbdTj5F5L_B7f_yVIXJn8OPaA1r4Uqkg/exec";

fetch(url)
.then(res => res.json())
.then(data => {

  const employees = [...new Set(data.map(r => r[1]))];
  const hours = [9,10,11,12,13,14,15];

  let table = "<tr><th>TIME</th>";

  employees.forEach(e => table += `<th>${e}</th>`);
  table += "</tr>";

  let counts = {office:0, field:0, external:0};

  hours.forEach(h => {
    table += `<tr><td class="time">${h}:00</td>`;

    employees.forEach(emp => {
      let record = data.find(r => r[1]==emp && r[2]==h);

      let work = record ? record[4] : "";
      let cls = "";

      if(work.includes("Office")) { cls="office"; counts.office++; }
      else if(work.includes("Field")) { cls="field"; counts.field++; }
      else if(work.includes("External")) { cls="external"; counts.external++; }

      table += `<td class="${cls}">${work}</td>`;
    });

    table += "</tr>";
  });

  document.getElementById("grid").innerHTML = table;

  // Chart
  new Chart(document.getElementById("chart"), {
    type: "pie",
    data: {
      labels: ["Office","Field","External"],
      datasets: [{
        data: [counts.office, counts.field, counts.external]
      }]
    }
  });

});
</script>

</body>
</html>
