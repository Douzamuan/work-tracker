<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>

<body style="
margin:0;
font-family:Arial;
background:url('https://raw.githubusercontent.com/Douzamuan/work-tracker/main/logo.png') no-repeat center;
background-size:500px;
background-color:#f4f6f9;
padding:40px;
">

<!-- LOGIN -->
<div id="loginBox" style="max-width:400px; margin:auto; text-align:center;">

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Enter Email"
style="width:100%; padding:12px; margin-top:10px; border-radius:6px; border:1px solid #ccc; background:white;">

<input type="password" id="password" placeholder="Enter Password"
style="width:100%; padding:12px; margin-top:10px; border-radius:6px; border:1px solid #ccc; background:white;">

<button onclick="login()" style="
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
margin-top:15px;">
Login
</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none; margin-top:40px;">

<h2 style="text-align:center;">Employee Work Data</h2>
<h3 style="text-align:center;">Total Entries: <span id="count"></span></h3>

<table border="1" style="
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;">
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Date</th>
<th>Hour</th>
<th>Work</th>
<th>Status</th>
<th>Time</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

</div>

<script>
const ADMIN_EMAIL = "davidthangchikim@gmail.com";
const ADMIN_PASSWORD = "Chikim-khomni";

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(email === ADMIN_EMAIL && password === ADMIN_PASSWORD){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadData();
  } else {
    alert("Invalid login");
  }
}

function loadData() {
  fetch("https://script.google.com/macros/s/AKfycbxxRz-4hWe1ikSdNUudfDWv51ZoYJOg7fcrY18ZveK7aAUr6_xQnl_zDo3JLVb8Ex2lQw/exec")
    .then(res => res.json())
    .then(data => {

      document.getElementById("count").innerText = data.length;

      let rows = "";
      data.forEach(item => {
        rows += `
        <tr>
          <td>${item.name}</td>
          <td>${item.email}</td>
          <td>${item.date}</td>
          <td>${item.hour}</td>
          <td>${item.work}</td>
          <td>${item.status}</td>
          <td>${item.time}</td>
        </tr>`;
      });

      document.getElementById("data").innerHTML = rows;
    });
}
</script>

</body>
</html>
