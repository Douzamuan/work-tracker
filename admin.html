<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: url('logo.png') no-repeat center fixed;
  background-size: 200px;
}

.glass {
  background: rgba(255,255,255,0.75);
  padding: 20px;
  margin: 30px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  text-align: center;
  border: 1px solid #ccc;
}

th {
  background: #3f2b96;
  color: white;
}
</style>
</head>

<body>

<div id="login" class="glass">
<h2>Admin Login</h2>
<input type="password" id="pass">
<button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none" class="glass">
<h2>Weekly Work Schedule</h2>

<select id="mode" onchange="load()">
<option value="day">Day</option>
<option value="week">Week</option>
<option value="month">Month</option>
</select>

<div id="grid"></div>

<canvas id="bar"></canvas>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzgW83D5h0KmIf2kQI1F9Le3Ux4Xg8EW5smijMbdTj5F5L_B7f_yVIXJn8OPaA1r4Uqkg/exec";
const PASS = "Chikim-khomhite";

function login() {
  if (pass.value === PASS) {
    login.style.display = "none";
    panel.style.display = "block";
    load();
  } else {
    alert("Wrong password");
  }
}

function load() {
  fetch(URL).then(r => r.json()).then(data => {
    let employees = [...new Set(data.slice(1).map(r => r[1]))];

    let html = "<table><tr><th>Time</th>";

    employees.forEach(e => html += `<th>${e}</th>`);
    html += "</tr>";

    for (let i = 9; i <= 17; i++) {
      html += `<tr><td>${i}:00</td>`;

      employees.forEach(emp => {
        let found = data.find(r =>
          r[1] === emp &&
          parseInt(r[2]) <= i &&
          parseInt(r[3]) > i
        );

        html += `<td>${found ? found[4] : ""}</td>`;
      });

      html += "</tr>";
    }

    html += "</table>";
    grid.innerHTML = html;

    let count = {};
    data.slice(1).forEach(r => {
      count[r[1]] = (count[r[1]] || 0) + 1;
    });

    new Chart(bar, {
      type: 'bar',
      data: {
        labels: Object.keys(count),
        datasets: [{ data: Object.values(count) }]
      }
    });
  });
}
</script>

</body>
</html>
