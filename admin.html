<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      text-align: center;

      /* 🖼 LOGO BACKGROUND CENTER */
      background: url("https://raw.githubusercontent.com/Douzamuan/work-tracker/main/logo.png") no-repeat center center fixed;
      background-size: 300px;
      background-color: #f5f6fa;
    }

    .overlay {
      background: rgba(255,255,255,0.9);
      min-height: 100vh;
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
    }

    th {
      background: #222;
      color: white;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    #dashboard {
      display: none;
    }
  </style>
</head>

<body>

<div class="overlay">

<!-- LOGIN -->
<div id="login">
  <h2>Admin Login</h2>
  <input type="password" id="password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <h2>Admin Panel</h2>

  <!-- DAY SELECTOR -->
  <input type="date" id="datePicker">

  <!-- TABLE -->
  <div id="table"></div>

  <!-- PIE CHART -->
  <canvas id="chart"></canvas>

</div>

</div>

<script>
let chart;

// LOGIN
function login() {
  google.script.run.withSuccessHandler(res => {
    if (res) {
      loginDiv.style.display = "none";
      dashboard.style.display = "block";
      loadData();
    } else alert("Wrong password");
  }).checkLogin(password.value);
}

// DEFAULT DATE
window.onload = () => {
  const today = new Date().toISOString().split("T")[0];
  datePicker.value = today;
  datePicker.addEventListener("change", loadData);
};

// LOAD DATA
function loadData() {
  google.script.run.withSuccessHandler(render).getData(datePicker.value);
}

// TABLE
function renderTable(data) {
  const hours = [...Array(9).keys()].map(i => i + 9);
  const employees = [...new Set(data.map(d => d.employee))];

  let html = "<table><tr><th>Hour</th>";

  employees.forEach(e => html += `<th>${e}</th>`);
  html += "</tr>";

  hours.forEach(h => {
    html += `<tr><td>${h}:00</td>`;

    employees.forEach(e => {
      const t = data.find(d => d.hour === h && d.employee === e);
      html += `<td>${t ? t.task : ""}</td>`;
    });

    html += "</tr>";
  });

  html += "</table>";

  table.innerHTML = html;
}

// PIE
function renderChart(analysis) {
  if (chart) chart.destroy();

  chart = new Chart(chartCanvas, {
    type: "pie",
    data: {
      labels: Object.keys(analysis),
      datasets: [{ data: Object.values(analysis) }]
    }
  });
}

// MAIN
function render(data) {
  renderTable(data.hourly);
  renderChart(data.analysis);
}
</script>

</body>
</html>
