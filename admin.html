<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h2>Admin Login</h2>
<input type="password" id="pass">
<button onclick="login()">Login</button>

<div id="panel" style="display:none">

  <input type="date" id="date">
  <div id="table"></div>
  <canvas id="chart"></canvas>

</div>

<script>
let chart;

function login() {
  const p = document.getElementById("pass").value;

  google.script.run
    .withSuccessHandler(res => {
      if (res) {
        document.getElementById("panel").style.display = "block";
        load();
      } else {
        alert("Wrong password");
      }
    })
    .checkLogin(p);
}

function load() {
  const d = document.getElementById("date").value;

  google.script.run
    .withSuccessHandler(render)
    .getData(d);
}

function render(data) {
  renderTable(data.hourly);
  renderChart(data.analysis);
}

function renderTable(data) {
  const hours = [9,10,11,12,13,14,15,16,17];
  const employees = [...new Set(data.map(d => d.employee))];

  let html = "<table border='1'><tr><th>Hour</th>";

  employees.forEach(e => html += `<th>${e}</th>`);
  html += "</tr>";

  hours.forEach(h => {
    html += `<tr><td>${h}:00</td>`;
    employees.forEach(e => {
      const t = data.find(x => x.hour == h && x.employee == e);
      html += `<td>${t ? t.task : ""}</td>`;
    });
    html += "</tr>";
  });

  html += "</table>";
  document.getElementById("table").innerHTML = html;
}

function renderChart(analysis) {
  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "pie",
    data: {
      labels: Object.keys(analysis),
      datasets: [{ data: Object.values(analysis) }]
    }
  });
}

// DEFAULT DATE
document.getElementById("date").value =
  new Date().toISOString().split("T")[0];

</script>

</body>
</html>
