<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #f4f6f9;
    }

    /* BACKGROUND LOGO */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("https://raw.githubusercontent.com/Douzamuan/work-tracker/main/logo.png") no-repeat center;
      background-size: 250px;
      opacity: 0.05;
      z-index: 0;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin: 20px auto;
      width: 95%;
      max-width: 1200px;
      position: relative;
      z-index: 1;
    }

    h2 {
      margin-bottom: 10px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th {
      background: #4CAF50;
      color: white;
    }

    th, td {
      padding: 10px;
      border: 1px solid #eee;
      text-align: center;
    }

    #dashboard { display: none; }
  </style>
</head>

<body>

<div class="card" id="loginBox">
  <h2>🔐 Admin Login</h2>
  <input type="password" id="password">
  <button onclick="login()">Login</button>
</div>

<div id="dashboard">

  <div class="card">
    <h2>📊 Admin Dashboard</h2>
    <input type="date" id="datePicker">
  </div>

  <div class="card">
    <div id="table"></div>
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
let chart;

// FIXED LOGIN
function login() {
  const pass = document.getElementById("password").value;

  google.script.run
    .withSuccessHandler(res => {
      if (res) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadData();
      } else alert("Wrong password");
    })
    .checkLogin(pass);
}

// DATE DEFAULT
window.onload = () => {
  const today = new Date().toISOString().split("T")[0];
  const picker = document.getElementById("datePicker");
  picker.value = today;
  picker.addEventListener("change", loadData);
};

// LOAD
function loadData() {
  const date = document.getElementById("datePicker").value;

  google.script.run
    .withSuccessHandler(render)
    .getData(date);
}

// TABLE
function renderTable(data) {
  const hours = [...Array(9).keys()].map(i => i + 9);
  const employees = [...new Set(data.map(d => d.employee))];

  let html = "<table><tr><th>Hour</th>";

  employees.forEach(e => html += `<th>${e}</th>`);
  html += "</tr>";

  hours.forEach(h => {
    html += `<tr><td>${h}:00</td>`;
    employees.forEach(e => {
      const t = data.find(d => d.hour === h && d.employee === e);
      html += `<td>${t ? t.task : "-"}</td>`;
    });
    html += "</tr>";
  });

  html += "</table>";
  document.getElementById("table").innerHTML = html;
}

// CHART
function renderChart(analysis) {
  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "pie",
    data: {
      labels: Object.keys(analysis),
      datasets: [{ data: Object.values(analysis) }]
    }
  });
}

// MAIN
function render(data) {
  renderTable(data.hourly);
  renderChart(data.analysis);
}
</script>

</body>
</html>
