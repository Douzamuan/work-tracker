<!-- admin.html -->
<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
</head>

<body>

<h2>Admin Panel</h2>

<input id="password" placeholder="Password">
<button onclick="login()">Login</button>

<div id="panel" style="display:none">

<select id="employee" onchange="loadGrid()"></select>

<table border="1">
<thead>
<tr>
<th>Time</th>
<th>Work</th>
</tr>
</thead>
<tbody id="grid"></tbody>
</table>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxxRz-4hWe1ikSdNUudfDWv51ZoYJOg7fcrY18ZveK7aAUr6_xQnl_zDo3JLVb8Ex2lQw/exec";
const PASS = "Chikim-khomhite";

function login(){
  if(password.value === PASS){
    panel.style.display="block";
    loadEmployees();
  }
}

function loadEmployees(){
  fetch(URL)
  .then(r=>r.json())
  .then(data=>{
    const names = [...new Set(data.map(d=>d.name))];
    employee.innerHTML = names.map(n=>`<option>${n}</option>`).join("");
    loadGrid();
  });
}

function loadGrid(){
  fetch(URL)
  .then(r=>r.json())
  .then(data=>{
    const emp = employee.value;

    let html="";

    for(let h=9;h<17;h++){
      const found = data.find(d => d.name===emp && d.start===h);

      let work = found ? found.work : "";

      let color = work.includes("Office") ? "yellow" :
                  work.includes("Sales") ? "green" : "";

      html += `
      <tr>
        <td>${h}:00 - ${h+1}:00</td>
        <td style="background:${color}">${work}</td>
      </tr>`;
    }

    grid.innerHTML = html;
  });
}
</script>

</body>
</html>
