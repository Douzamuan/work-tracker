<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background: #3f2b96; color: white; }
        .time-col { background: #e8f5e9; font-weight: bold; width: 100px; }
        
        /* 🔥 Color Coding */
        .office { background: #bbdefb !important; color: #0d47a1; font-weight: bold; }
        .field { background: #fff9c4 !important; color: #f57f17; font-weight: bold; }
        .external { background: #f8bbd0 !important; color: #880e4f; font-weight: bold; }
        
        .chart-box { width: 300px; margin: 40px auto; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center">Admin Dashboard: Weekly Overview</h2>
        <table id="adminGrid"><tr><td>Loading Grid...</td></tr></table>
        
        <div class="chart-box">
            <canvas id="workChart"></canvas>
        </div>
    </div>

    <script>
        google.script.run.withSuccessHandler(drawDashboard).getAdminData();

        function drawDashboard(data) {
            const employees = [...new Set(data.map(r => r[1]))];
            const hours = [9, 10, 11, 12, 13, 14, 15, 16, 17];
            let counts = { "Office": 0, "Field": 0, "External": 0 };

            let html = "<tr><th>TIME</th>" + employees.map(e => `<th>${e}</th>`).join('') + "</tr>";

            hours.forEach(h => {
                html += `<tr><td class="time-col">${h}:00</td>`;
                employees.forEach(emp => {
                    let match = data.find(r => r[1] === emp && parseInt(r[2]) === h);
                    let val = match ? match[4] : "";
                    let cls = "";
                    if(val.includes("Office")) { cls = "office"; counts.Office++; }
                    if(val.includes("Field")) { cls = "field"; counts.Field++; }
                    if(val.includes("External")) { cls = "external"; counts.External++; }
                    html += `<td class="${cls}">${val}</td>`;
                });
                html += "</tr>";
            });
            document.getElementById('adminGrid').innerHTML = html;

            new Chart(document.getElementById('workChart'), {
                type: 'pie',
                data: {
                    labels: ['Office', 'Field', 'External'],
                    datasets: [{
                        data: [counts.Office, counts.Field, counts.External],
                        backgroundColor: ['#2196f3', '#fbc02d', '#e91e63']
                    }]
                }
            });
        }
    </script>
</body>
</html>
