<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
</head>

<body style="margin:0; font-family:Arial; background:#f4f6f9;">

<!-- 🔥 FIXED LOGO -->
<div style="
position:fixed;
top:50%;
left:50%;
transform:translate(-50%, -50%);
opacity:0.1;
z-index:-1;">
<img src="https://raw.githubusercontent.com/Douzamuan/work-tracker/main/logo.png" width="500">
</div>

<div style="padding:20px;">

<!-- 🔐 LOGIN -->
<div id="loginBox" style="text-align:center;">
<h2>Admin Login</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>
</div>

<!-- 📊 DASHBOARD -->
<div id="dashboard" style="display:none;">

<h2 style="text-align:center;">Weekly Work Schedule</h2>

<!-- 👤 EMPLOYEE SELECT -->
<select id="employee" onchange="loadGrid()"></select>

<!-- 📅 GRID -->
<table border="1" style="
width:100%;
border-collapse:collapse;
margin-top:20px;
background:rgba(255,255,255,0.4);
backdrop-filter:blur(5px);">

<thead>
<tr style="background:#2f5d50; color:white;">
<th>TIME</th>
<th>MONDAY</th>
<th>TUESDAY</th>
<th>WEDNESDAY</th>
<th>THURSDAY</th>
<th>FRIDAY</th>
</tr>
</thead>

<tbody id="grid"></tbody>

</table>

<!-- ➕ ADD EMPLOYEE -->
<h3>Add Employee</h3>
<input id="newEmp" placeholder="Employee Name">
<button onclick="addEmp()">Add</button>

<!-- 👥 EMPLOYEE LIST -->
<h3>Employees</h3>
<div id="empList"></div>

</div>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxBfGAQzxtF3HrG-vW6kETljk1B3bnVlEp6G8FLiPYr_Oh7_Z-86qAVd0m6AKnI0qlF_A/exec";

// 🔐 CHANGE THESE
const ADMIN_EMAIL = "davidthangchikim@gmail.com";
const ADMIN_PASSWORD = "Chikim-khomhite";

// 🔐 LOGIN
function login(){
  if(email.value === ADMIN_EMAIL && password.value === ADMIN_PASSWORD){
    loginBox.style.display="none";
    dashboard.style.display="block";

    loadEmployees();
    loadEmpList();

    setInterval(loadGrid, 5000);
  } else {
    alert("Invalid login");
  }
}

// 📥 LOAD EMPLOYEES INTO DROPDOWN
function loadEmployees(){
  fetch(URL + "?action=getEmployees")
  .then(r=>r.json())
  .then(data=>{
    employee.innerHTML = data.map(n=>`<option>${n}</option>`).join("");
    loadGrid();
  });
}

// 👥 LOAD EMPLOYEE LIST (BOTTOM)
function loadEmpList(){
  fetch(URL + "?action=getEmployees")
  .then(r=>r.json())
  .then(data=>{
    empList.innerHTML = data.map(n=>`
      <span style="
        margin:5px;
        padding:5px 10px;
        background:#ddd;
        border-radius:5px;
        display:inline-block;">
        ${n}
      </span>
    `).join("");
  });
}

// ➕ ADD EMPLOYEE
function addEmp(){
  if(!newEmp.value){
    alert("Enter name");
    return;
  }

  fetch(URL + "?action=addEmployee&name=" + newEmp.value)
  .then(()=>{
    newEmp.value="";
    loadEmployees();
    loadEmpList();
  });
}

// 📅 DAY CONVERT
function getDayName(dateStr){
  const d = new Date(dateStr);
  return ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"][d.getDay()];
}

// 🎨 COLOR LOGIC
function getColor(work){
  work = work.toLowerCase();

  if(work.includes("office")) return "#f7d774";
  if(work.includes("sales")) return "#2ecc71";
  if(work.includes("meeting")) return "#3498db";

  return "#ccc";
}

// ⏰ FORMAT TIME
function formatHour(h){
  return `${convert(h)} - ${convert(h+1)}`;
}

function convert(h){
  let ampm = h >= 12 ? "PM" : "AM";
  let hour = h % 12 || 12;
  return hour + ":00 " + ampm;
}

// 📊 LOAD GRID
function loadGrid(){
  fetch(URL)
  .then(r=>r.json())
  .then(data=>{

    const emp = employee.value;

    let html = "";

    for(let h=9; h<17; h++){

      html += `<tr>
        <td>${formatHour(h)}</td>`;

      ["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY"].forEach(day=>{

        const entry = data.find(d =>
          d.name === emp &&
          d.start === h &&
          getDayName(d.date) === day
        );

        if(entry){
          const color = getColor(entry.work);
          html += `<td style="
            background:${color};
            font-weight:bold;
            text-align:center;">
            ${entry.work}
          </td>`;
        } else {
          html += `<td></td>`;
        }

      });

      html += `</tr>`;
    }

    grid.innerHTML = html;
  });
}
</script>

</body>
</html>
