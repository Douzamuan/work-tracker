<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f6fa;
    }

    .container {
      width: 90%;
      margin: auto;
    }

    .logo {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .logo img {
      width: 120px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }

    th {
      background: #333;
      color: white;
    }

    #dashboard {
      display: none;
    }
  </style>
</head>

<body>

<!-- 🖼️ LOGO CENTERED -->
<div class="logo">
  <img src="https://via.placeholder.com/120" id="logo">
</div>

<!-- 🔐 LOGIN -->
<div id="login">
  <h2>Admin Login</h2>
  <input type="password" id="password" placeholder="Enter password">
  <button onclick="login()">Login</button>
</div>

<!-- 📊 DASHBOARD -->
<div id="dashboard" class="container">

  <h2>Admin Panel</h2>

  <!-- 📅 DAY SELECTOR -->
  <input type="date" id="datePicker">

  <!-- 📋 TABLE -->
  <div id="table"></div>

  <!-- 🥧 PIE CHART -->
  <canvas id="chart" width="400" height="200"></canvas>

</div>

<script>
let chart;

// 🔐 LOGIN
function login() {
  const password = document.getElementById("password").value;

  google.script.run.withSuccessHandler(res => {
    if (res) {
      document.getElementById("login").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      loadData();
    } else {
      alert("Wrong password");
    }
  }).checkLogin(password);
}

// 📅 DEFAULT TODAY
window.onload = () => {
  const today = new Date().toISOString().split("T")[0];
  document.getElementById("datePicker").value = today;
  document.getElementById("datePicker").addEventListener("change", loadData);
};

// 📊 LOAD DATA
function loadData() {
  const date = document.getElementById("datePicker").value;

  google.script.run.withSuccessHandler(render).getData(date);
}

// 📋 RENDER TABLE + CHART
function render(data) {
  renderTable(data.hourly);
  renderChart(data.analysis);
}

// 📋 TABLE
function renderTable(data) {
  const hours = [...Array(9).keys()].map(i => i + 9);
  const employees = [...new Set(data.map(d => d.employee))];

  let html = "<table><tr><th>Hour</th>";

  employees.forEach(e => html += `<th>${e}</th>`);
  html += "</tr>";

  hours.forEach(h => {
    html += `<tr><td>${h}:00</td>`;

    employees.forEach(e => {
      const task = data.find(d => d.hour === h && d.employee === e);
      html += `<td>${task ? task.task : ""}</td>`;
    });

    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("table").innerHTML = html;
}

// 🥧 PIE CHART
function renderChart(analysis) {
  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "pie",
    data: {
      labels: Object.keys(analysis),
      datasets: [{
        data: Object.values(analysis)
      }]
    }
  });
}
</script>

</body>
</html>
