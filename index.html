<!DOCTYPE html>
<html>
<head>
<title>Employee Work</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: url('https://raw.githubusercontent.com/Douzamuan/work-tracker/main/logo.png') no-repeat center fixed;
  background-size: 200px;
  font-family: Arial;
}

.box {
  background: rgba(255,255,255,0.9);
  margin: 30px;
  padding: 20px;
  border-radius: 12px;
}

input, textarea, button {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
}

button {
  background: #3f2b96;
  color: white;
}

table {
  width: 100%;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="box">
<h2>Fill Your Work</h2>

<input id="name" placeholder="Your Name">
<input type="date" id="date">
<input type="time" id="start">
<input type="time" id="end">
<textarea id="work" placeholder="Work"></textarea>

<button onclick="submitWork()">Submit</button>

<h3>Your Work</h3>
<div id="table"></div>

<canvas id="pie"></canvas>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzgW83D5h0KmIf2kQI1F9Le3Ux4Xg8EW5smijMbdTj5F5L_B7f_yVIXJn8OPaA1r4Uqkg/exec";

function submitWork() {
  const employee = document.getElementById("name").value.trim();
  const date = document.getElementById("date").value;
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;
  const work = document.getElementById("work").value.trim();

  if (!employee || !date || !start || !end || !work) {
    alert("Fill all fields properly");
    return;
  }

  const startHour = parseInt(start.split(":")[0]);
  const endHour = parseInt(end.split(":")[0]);

  if (endHour <= startHour) {
    alert("End time must be greater than start time");
    return;
  }

  fetch(URL, {
    method: "POST",
    body: JSON.stringify({
      employee,
      date,
      start: startHour,
      end: endHour,
      work
    })
  }).then(() => {
    alert("Submitted successfully");
    loadData();
  });
}

function loadData() {
  fetch(URL)
    .then(res => res.json())
    .then(data => {

      let html = "<table border='1'>";
      let count = {};

      data.slice(1).forEach(r => {

        for (let i = r[2]; i < r[3]; i++) {
          html += `<tr>
            <td>${i}:00</td>
            <td>${r[4]}</td>
          </tr>`;
        }

        count[r[4]] = (count[r[4]] || 0) + 1;
      });

      html += "</table>";
      document.getElementById("table").innerHTML = html;

      new Chart(document.getElementById("pie"), {
        type: 'pie',
        data: {
          labels: Object.keys(count),
          datasets: [{ data: Object.values(count) }]
        }
      });
    });
}

loadData();
</script>

</body>
</html>
