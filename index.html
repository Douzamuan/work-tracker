<!DOCTYPE html>
<html>
<head>
<title>Employee Schedule</title>
</head>

<body style="margin:0; font-family:Arial;">

<!-- FIXED LOGO -->
<div style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); opacity:0.1; z-index:-1;">
<img src="https://raw.githubusercontent.com/Douzamuan/work-tracker/main/logo.png" width="500">
</div>

<div style="padding:20px;">

<h2>Employee Schedule</h2>

<input id="name" placeholder="Your Name" required>
<input id="date" type="date" required>

<input id="start" placeholder="Start (9 AM)" required>
<input id="end" placeholder="End (4 PM)" required>

<textarea id="work" placeholder="Work" required></textarea>

<button onclick="submitData()">Submit</button>

<h3>Your Weekly Grid</h3>

<table border="1" style="width:100%; background:rgba(255,255,255,0.4);">
<thead>
<tr>
<th>TIME</th>
<th>MON</th>
<th>TUE</th>
<th>WED</th>
<th>THU</th>
<th>FRI</th>
</tr>
</thead>

<tbody id="grid"></tbody>
</table>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxBfGAQzxtF3HrG-vW6kETljk1B3bnVlEp6G8FLiPYr_Oh7_Z-86qAVd0m6AKnI0qlF_A/exec";

function submitData(){
  const data = {
    name:name.value,
    date:date.value,
    start:start.value,
    end:end.value,
    work:work.value
  };

  if(!data.name || !data.date || !data.start || !data.end || !data.work){
    alert("Fill all fields");
    return;
  }

  fetch(URL,{
    method:"POST",
    body:JSON.stringify(data)
  })
  .then(r=>r.text())
  .then(res=>{
    alert(res);
    loadGrid();
  });
}

function getDay(date){
  return ["SUN","MON","TUE","WED","THU","FRI","SAT"][new Date(date).getDay()];
}

function loadGrid(){
  fetch(URL)
  .then(r=>r.json())
  .then(data=>{
    let html="";

    for(let h=9; h<17; h++){
      html += "<tr><td>"+h+":00</td>";

      ["MON","TUE","WED","THU","FRI"].forEach(day=>{
        const entry = data.find(d =>
          d.name === name.value &&
          d.start === h &&
          getDay(d.date) === day
        );

        html += `<td>${entry ? entry.work : ""}</td>`;
      });

      html += "</tr>";
    }

    grid.innerHTML = html;
  });
}
</script>

</body>
</html>
