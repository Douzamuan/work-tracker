<!DOCTYPE html>
<html>
<head>
  <title>Work Tracker</title>
</head>

<body style="
margin:0;
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;">

<div style="
width:100%;
max-width:450px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);">

<h2 style="text-align:center;">Hourly Work Entry</h2>
<p style="text-align:center; color:gray;">Track your work every hour</p>

<input id="name" placeholder="Your Name"
style="width:100%; padding:12px; margin-top:10px; border-radius:6px; border:1px solid #ccc;">

<input id="email" type="email" placeholder="Your Email"
style="width:100%; padding:12px; margin-top:10px; border-radius:6px; border:1px solid #ccc;">

<input id="date" type="date"
style="width:100%; padding:12px; margin-top:10px; border-radius:6px; border:1px solid #ccc;">

<select id="hour"
style="width:100%; padding:12px; margin-top:10px; border-radius:6px; border:1px solid #ccc;">
  <option>9-10 AM</option>
  <option>10-11 AM</option>
  <option>11-12 PM</option>
  <option>12-1 PM</option>
  <option>1-2 PM</option>
  <option>2-3 PM</option>
  <option>3-4 PM</option>
  <option>4-5 PM</option>
</select>

<textarea id="work" placeholder="What are you doing?"
style="width:100%; padding:12px; margin-top:10px; border-radius:6px; border:1px solid #ccc;"></textarea>

<select id="status"
style="width:100%; padding:12px; margin-top:10px; border-radius:6px; border:1px solid #ccc;">
  <option>Pending</option>
  <option>Completed</option>
</select>

<button onclick="submitData()" style="
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
margin-top:15px;">
Submit
</button>

</div>

<!-- WATERMARK -->
<div style="
position:fixed;
top:50%;
left:50%;
transform:translate(-50%, -50%);
opacity:0.04;
z-index:-1;">
  <img src="https://raw.githubusercontent.com/Douzamuan/work-tracker/main/logo.png" width="500">
</div>

<script>
function submitData() {
  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    date: document.getElementById("date").value,
    hour: document.getElementById("hour").value,
    work: document.getElementById("work").value,
    status: document.getElementById("status").value
  };

  fetch("https://script.google.com/macros/s/AKfycbxxRz-4hWe1ikSdNUudfDWv51ZoYJOg7fcrY18ZveK7aAUr6_xQnl_zDo3JLVb8Ex2lQw/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(() => {
    alert("Submitted Successfully");

    document.querySelectorAll("input, textarea").forEach(el => el.value = "");
  })
  .catch(() => alert("Error"));
}
</script>

</body>
</html>
