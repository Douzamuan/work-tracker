<!DOCTYPE html>
<html>
<head>
  <base target="_top">

  <style>
    body {
      font-family: "Segoe UI";
      background: #f4f6f9;
      text-align: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("https://raw.githubusercontent.com/Douzamuan/work-tracker/main/logo.png") no-repeat center;
      background-size: 250px;
      opacity: 0.05;
    }

    .card {
      background: white;
      padding: 25px;
      width: 320px;
      margin: 80px auto;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      position: relative;
      z-index: 1;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>📝 Submit Work</h2>

  <input type="date" id="date">
  <input type="text" id="employee" placeholder="Your Name">
  <input type="text" id="task" placeholder="Task">

  <select id="start"></select>
  <select id="end"></select>

  <button onclick="submit()">Submit</button>
</div>

<script>
const start = document.getElementById("start");
const end = document.getElementById("end");

for (let i = 9; i <= 17; i++) {
  const val = (i < 10 ? "0" : "") + i + ":00";
  start.innerHTML += `<option value="${i}">${val}</option>`;
  end.innerHTML += `<option value="${i}">${val}</option>`;
}

document.getElementById("date").value =
  new Date().toISOString().split("T")[0];

function submit() {
  const data = {
    date: document.getElementById("date").value,
    employee: document.getElementById("employee").value,
    task: document.getElementById("task").value,
    start: document.getElementById("start").value,
    end: document.getElementById("end").value
  };

  google.script.run
    .withSuccessHandler(() => {
      alert("✅ Submitted!");
    })
    .withFailureHandler(err => {
      alert("❌ " + err.message);
    })
    .submitWork(data);
}
</script>

</body>
</html>
