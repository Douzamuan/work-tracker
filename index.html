<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #1a73e8; margin-bottom: 20px; text-align: center; }
        label { display: block; margin-top: 15px; color: #5f6368; font-size: 14px; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #1a73e8; color: white; border: none; padding: 15px; border-radius: 8px; margin-top: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1765cc; }
        .loader { display: none; text-align: center; margin-top: 10px; color: #1a73e8; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Work Entry</h2>
        <form id="workForm">
            <label>Date</label>
            <input type="date" name="date" required id="dateInput">

            <label>Employee Name</label>
            <select name="employee" required>
                <option value="">Select Name</option>
                <option>John Doe</option>
                <option>Jane Smith</option>
                <option>Alex Wong</option>
            </select>

            <label>Start Hour (24h)</label>
            <select name="startHour" required>
                <option value="9">09:00</option>
                <option value="10">10:00</option>
                <option value="11">11:00</option>
                <option value="12">12:00</option>
                <option value="13">13:00</option>
                <option value="14">14:00</option>
                <option value="15">15:00</option>
                <option value="16">16:00</option>
                <option value="17">17:00</option>
            </select>

            <label>Work Type</label>
            <select name="workType" required>
                <option>Office Work</option>
                <option>Field Work</option>
                <option>External Work</option>
            </select>

            <button type="submit" id="submitBtn">Submit Entry</button>
            <div id="loader" class="loader">Saving...</div>
        </form>
    </div>

    <script>
        // Set default date to today
        document.getElementById('dateInput').valueAsDate = new Date();

        document.getElementById('workForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            
            btn.disabled = true;
            loader.style.display = 'block';

            const formData = {
                date: this.date.value,
                employee: this.employee.value,
                startHour: this.startHour.value,
                workType: this.workType.value
            };

            google.script.run.withSuccessHandler(() => {
                alert("Data Saved Successfully!");
                this.reset();
                btn.disabled = false;
                loader.style.display = 'none';
                document.getElementById('dateInput').valueAsDate = new Date();
            }).processForm(formData);
        };
    </script>
</body>
</html>
