<!DOCTYPE html>
<html>
<head>
<title>Employee Panel</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: url('logo.png') no-repeat center fixed;
  background-size: 200px;
  font-family: Arial;
}

.glass {
  background: rgba(255,255,255,0.75);
  padding: 20px;
  margin: 30px;
  border-radius: 12px;
}

input, textarea, button {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
}

button {
  background: #3f2b96;
  color: white;
}

table {
  width: 100%;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="glass">
<h2>Employee Work Entry</h2>

<input id="name" placeholder="Your Name">
<input type="date" id="date">
<input type="time" id="start">
<input type="time" id="end">
<textarea id="work" placeholder="Work"></textarea>

<button onclick="submit()">Submit</button>

<h3>Your Work Table</h3>
<div id="table"></div>

<canvas id="pie"></canvas>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzgW83D5h0KmIf2kQI1F9Le3Ux4Xg8EW5smijMbdTj5F5L_B7f_yVIXJn8OPaA1r4Uqkg/exec";

function submit() {
  let data = {
    employee: name.value,
    date: date.value,
    start: start.value,
    end: end.value,
    work: work.value
  };

  if (!data.employee || !data.date || !data.start || !data.end || !data.work) {
    alert("Fill all fields");
    return;
  }

  fetch(URL, {
    method: "POST",
    body: JSON.stringify(data)
  }).then(() => {
    alert("Saved");
    load();
  });
}

function split(start, end) {
  let s = parseInt(start);
  let e = parseInt(end);
  let arr = [];
  for (let i = s; i < e; i++) {
    arr.push(i + ":00");
  }
  return arr;
}

function load() {
  fetch(URL).then(r => r.json()).then(data => {
    let html = "<table border='1'>";
    let count = {};

    data.slice(1).forEach(r => {
      let hours = split(r[2], r[3]);

      hours.forEach(h => {
        html += `<tr><td>${h}</td><td>${r[4]}</td></tr>`;
      });

      count[r[4]] = (count[r[4]] || 0) + 1;
    });

    html += "</table>";
    table.innerHTML = html;

    new Chart(pie, {
      type: 'pie',
      data: {
        labels: Object.keys(count),
        datasets: [{ data: Object.values(count) }]
      }
    });
  });
}

load();
</script>

</body>
</html>
