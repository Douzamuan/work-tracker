<!DOCTYPE html>
<html>
<head>
  <title>Employee Schedule</title>
</head>

<body style="margin:0;font-family:Arial;background:#f4f6f9;">

<!-- FIXED LOGO -->
<div style="
position:fixed;
top:50%;
left:50%;
transform:translate(-50%, -50%);
opacity:0.08;
z-index:-1;">
<img src="https://raw.githubusercontent.com/Douzamuan/work-tracker/main/logo.png" width="400">
</div>

<div style="max-width:500px;margin:60px auto;padding:20px;">

<h2 style="text-align:center;">Employee Schedule</h2>

<input id="name" placeholder="Your Name"
style="width:100%;padding:12px;margin-top:10px;border-radius:6px;border:1px solid #ccc;">

<input id="date" type="date"
style="width:100%;padding:12px;margin-top:10px;border-radius:6px;border:1px solid #ccc;">

<input id="start" placeholder="Start Time (e.g. 9 AM)"
style="width:100%;padding:12px;margin-top:10px;border-radius:6px;border:1px solid #ccc;">

<input id="end" placeholder="End Time (e.g. 2 PM)"
style="width:100%;padding:12px;margin-top:10px;border-radius:6px;border:1px solid #ccc;">

<input id="work" placeholder="Work (Office / Sales / Meeting)"
style="width:100%;padding:12px;margin-top:10px;border-radius:6px;border:1px solid #ccc;">

<button onclick="submitData()" style="
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
margin-top:15px;">
Submit
</button>

</div>

<script>
function submitData(){
  const name = document.getElementById("name").value.trim();
  const date = document.getElementById("date").value;
  const start = document.getElementById("start").value.trim();
  const end = document.getElementById("end").value.trim();
  const work = document.getElementById("work").value.trim();

  // ✅ FIXED VALIDATION
  if(!name || !date || !start || !end || !work){
    alert("Please fill all fields properly");
    return;
  }

  const data = {
    name,
    date,
    time: start + " - " + end,
    work,
    status: "Pending"
  };

  fetch("https://script.google.com/macros/s/AKfycbxBfGAQzxtF3HrG-vW6kETljk1B3bnVlEp6G8FLiPYr_Oh7_Z-86qAVd0m6AKnI0qlF_A/execPASTE_SCRIPT_URL", {
    method:"POST",
    body: JSON.stringify(data)
  })
  .then(()=>{
    alert("Submitted Successfully");

    document.getElementById("name").value="";
    document.getElementById("date").value="";
    document.getElementById("start").value="";
    document.getElementById("end").value="";
    document.getElementById("work").value="";
  });
}
</script>

</body>
</html>
