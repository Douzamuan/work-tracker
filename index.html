<!DOCTYPE html>
<html>
<head>
  <base target="_top">

  <style>
    body {
      font-family: Arial;
      text-align: center;

      /* 🖼 LOGO BACKGROUND */
      background: url("https://raw.githubusercontent.com/Douzamuan/work-tracker/main/logo.png") no-repeat center center fixed;
      background-size: 300px;
      background-color: #f5f6fa;
    }

    .overlay {
      background: rgba(255,255,255,0.9);
      min-height: 100vh;
      padding-top: 50px;
    }

    .box {
      background: white;
      padding: 20px;
      width: 320px;
      margin: auto;
      border-radius: 10px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }
  </style>
</head>

<body>

<div class="overlay">

<div class="box">
  <h2>Submit Work</h2>

  <input type="date" id="date">
  <input type="text" id="employee" placeholder="Your Name">

  <input type="text" id="task" placeholder="Task (e.g. Office Work)">

  <select id="start"></select>
  <select id="end"></select>

  <button onclick="submit()">Submit</button>
</div>

</div>

<script>
// TIME DROPDOWN
for (let i = 9; i <= 17; i++) {
  const val = (i < 10 ? "0" : "") + i + ":00";
  start.innerHTML += `<option>${val}</option>`;
  end.innerHTML += `<option>${val}</option>`;
}

// DEFAULT DATE
date.value = new Date().toISOString().split("T")[0];

// SUBMIT
function submit() {
  const data = {
    date: date.value,
    employee: employee.value,
    task: task.value,
    start: start.value,
    end: end.value
  };

  google.script.run.withSuccessHandler(() => {
    alert("Submitted successfully!");
  }).submitWork(data);
}
</script>

</body>
</html>
