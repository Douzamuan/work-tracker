<!DOCTYPE html>
<html>
<head>
  <title>Work Tracker</title>
</head>

<body style="
margin:0;
font-family:Arial;
background:url('https://raw.githubusercontent.com/Douzamuan/work-tracker/main/logo.png') no-repeat center;
background-size:500px;
background-color:#f4f6f9;
">

<div style="
max-width:500px;
margin:80px auto;
padding:20px;">

<h2 style="text-align:center;">Hourly Work Entry</h2>
<p style="text-align:center; color:gray;">Track your work every hour</p>

<input id="name" placeholder="Your Name"
style="width:100%; padding:12px; margin-top:10px; border-radius:6px; border:1px solid #ccc; background:rgba(255,255,255,0.9);">

<input id="email" type="email" placeholder="Your Email"
style="width:100%; padding:12px; margin-top:10px; border-radius:6px; border:1px solid #ccc; background:rgba(255,255,255,0.9);">

<input id="date" type="date"
style="width:100%; padding:12px; margin-top:10px; border-radius:6px; border:1px solid #ccc; background:rgba(255,255,255,0.9);">

<select id="hour"
style="width:100%; padding:12px; margin-top:10px; border-radius:6px; border:1px solid #ccc; background:rgba(255,255,255,0.9);">
  <option>9-10 AM</option>
  <option>10-11 AM</option>
  <option>11-12 PM</option>
  <option>12-1 PM</option>
  <option>1-2 PM</option>
  <option>2-3 PM</option>
  <option>3-4 PM</option>
  <option>4-5 PM</option>
</select>

<textarea id="work" placeholder="What are you doing?"
style="width:100%; padding:12px; margin-top:10px; border-radius:6px; border:1px solid #ccc; background:rgba(255,255,255,0.9);"></textarea>

<select id="status"
style="width:100%; padding:12px; margin-top:10px; border-radius:6px; border:1px solid #ccc; background:rgba(255,255,255,0.9);">
  <option>Pending</option>
  <option>Completed</option>
</select>

<button onclick="submitData()" style="
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
margin-top:15px;">
Submit
</button>

</div>

<script>
function submitData() {
  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    date: document.getElementById("date").value,
    hour: document.getElementById("hour").value,
    work: document.getElementById("work").value,
    status: document.getElementById("status").value
  };

  fetch("https://script.google.com/macros/s/AKfycbxxRz-4hWe1ikSdNUudfDWv51ZoYJOg7fcrY18ZveK7aAUr6_xQnl_zDo3JLVb8Ex2lQw/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("Submitted Successfully");
    document.querySelectorAll("input, textarea").forEach(el => el.value = "");
  });
}
</script>

</body>
</html>
