<!DOCTYPE html>
<html>
<head>
  <title>Weekly Work Entry</title>
</head>

<body style="margin:0;font-family:Arial;background:#f4f6f9;">

<!-- FIXED LOGO -->
<div style="
position:fixed;
top:50%;
left:50%;
transform:translate(-50%, -50%);
opacity:0.1;
z-index:-1;">
<img src="https://raw.githubusercontent.com/Douzamuan/work-tracker/main/logo.png" width="500">
</div>

<div style="max-width:500px;margin:80px auto;padding:20px;">

<h2 style="text-align:center;">Work Entry</h2>

<input id="name" placeholder="Your Name" required style="width:100%;padding:12px;margin-top:10px;">
<input id="date" type="date" required style="width:100%;padding:12px;margin-top:10px;">
<input id="time" placeholder="9 AM - 12 PM" required style="width:100%;padding:12px;margin-top:10px;">
<textarea id="work" placeholder="Work details" required style="width:100%;padding:12px;margin-top:10px;"></textarea>

<button onclick="submitData()" style="width:100%;padding:12px;margin-top:15px;background:#007bff;color:white;border:none;">
Submit
</button>

</div>

<script>
function submitData(){
  const data = {
    name: document.getElementById("name").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    work: document.getElementById("work").value,
    status: "Pending"
  };

  if(!data.name || !data.date || !data.time || !data.work){
    alert("Fill all fields");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbxxRz-4hWe1ikSdNUudfDWv51ZoYJOg7fcrY18ZveK7aAUr6_xQnl_zDo3JLVb8Ex2lQw/exec", {
    method:"POST",
    body: JSON.stringify(data)
  })
  .then(()=> {
    alert("Submitted");
    document.querySelectorAll("input, textarea").forEach(el => el.value="");
  });
}
</script>

</body>
</html>
