<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
<title>Employee Work</title>
</head>

<body>

<h2>Work Entry</h2>

<input id="name" placeholder="Name" required><br>
<input id="date" type="date" required><br>

<input id="start" placeholder="Start (e.g. 9 AM)" required><br>
<input id="end" placeholder="End (e.g. 4 PM)" required><br>

<textarea id="work" placeholder="Work" required></textarea><br>

<button onclick="submitData()">Submit</button>

<h3>Your Schedule</h3>
<div id="schedule"></div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxxRz-4hWe1ikSdNUudfDWv51ZoYJOg7fcrY18ZveK7aAUr6_xQnl_zDo3JLVb8Ex2lQw/exec";

function submitData(){
  const data = {
    name: name.value,
    date: date.value,
    start: start.value,
    end: end.value,
    work: work.value
  };

  fetch(URL, {
    method:"POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    alert(res);
    loadSchedule();
  });
}

function loadSchedule(){
  fetch(URL)
  .then(res=>res.json())
  .then(data=>{
    let html="";
    data
    .filter(d => d.name === name.value && d.date === date.value)
    .forEach(d=>{
      html += `<p>${d.start}:00 - ${d.end}:00 → ${d.work}</p>`;
    });
    schedule.innerHTML = html;
  });
}
</script>

</body>
</html>
